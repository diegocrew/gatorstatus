<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GatorStatus</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f172a;
      --surface: #1e293b;
      --border:  #334155;
      --text:    #f1f5f9;
      --muted:   #64748b;
      --c-up:    #22c55e;
      --c-part:  #eab308;
      --c-down:  #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .logo { font-size: 1.35rem; font-weight: 700; flex: 1; letter-spacing: -0.02em; }

    .filters { display: flex; gap: 0.375rem; }
    .filter-btn {
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 500;
    }
    .filter-btn:hover { color: var(--text); border-color: #475569; }
    .filter-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    .updated { color: var(--muted); font-size: 0.74rem; }

    /* ── cards ───────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── summary heatmap ─────────────────────────────────── */
    .heatmap { display: flex; flex-direction: column; gap: 6px; }
    .heatmap-row { display: flex; align-items: center; gap: 10px; }
    .heatmap-label {
      width: 72px;
      font-size: 0.8rem;
      font-weight: 500;
      text-align: right;
      flex-shrink: 0;
    }
    .heatmap-cells {
      display: flex;
      flex: 1;
      gap: 2px;
      height: 22px;
      overflow: hidden;
    }
    .heatmap-cell {
      flex: 1;
      border-radius: 2px;
      min-width: 3px;
      cursor: default;
    }
    .cell-up                        { background: var(--c-up); }
    .cell-warn, .cell-maintenance   { background: var(--c-part); }
    .cell-down, .cell-unknown       { background: var(--c-down); }
    .cell-nodata                    { background: rgba(239,68,68,.18); }

    .legend {
      display: flex;
      gap: 1.25rem;
      margin-top: 0.85rem;
      padding-left: 82px;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.71rem; color: var(--muted); }
    .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* ── service cards ───────────────────────────────────── */
    .svc-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
    }
    @media (max-width: 620px) { .svc-grid { grid-template-columns: 1fr; } }

    .svc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }
    .svc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .svc-name { font-size: 0.95rem; font-weight: 600; }

    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }
    .badge-up                         { background: rgba(34,197,94,.15);  color: var(--c-up);   }
    .badge-warn, .badge-maintenance   { background: rgba(234,179,8,.15);  color: var(--c-part); }
    .badge-down, .badge-unknown       { background: rgba(239,68,68,.15);  color: var(--c-down); }

    .chart-wrap { position: relative; height: 68px; }

    /* ── misc ────────────────────────────────────────────── */
    .loading { text-align: center; padding: 4rem; color: var(--muted); }
    .err     { text-align: center; padding: 2rem; color: var(--c-down); }
  </style>
</head>
<body>

<div id="app"><div class="loading">Loading…</div></div>

<script>
const SERVICES = [
  { key: 'ea',         name: 'EA'         },
  { key: 'steam',      name: 'Steam'      },
  { key: 'ubisoft',    name: 'Ubisoft'    },
  { key: 'epic_store', name: 'Epic Store' }
];

const CLR = {
  up:          '#22c55e',
  warn:        '#eab308',
  maintenance: '#eab308',
  down:        '#ef4444',
  unknown:     '#ef4444',
  nodata:      'rgba(239,68,68,.18)'
};

const PRIORITY = ['down', 'unknown', 'maintenance', 'warn', 'up'];

function parseTs(ts) {
  const m = ts.match(/(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2}:\d{2}) (CET|CEST)/);
  if (!m) return new Date(ts);
  return new Date(`${m[1]}T${m[2]}${m[3] === 'CEST' ? '+02:00' : '+01:00'}`);
}

function worst(statuses) {
  for (const s of PRIORITY) if (statuses.includes(s)) return s;
  return null;
}

// Returns array of {start, end} Date pairs, oldest→newest, ending at ~now
function getBuckets(range) {
  const now = Date.now();
  const [step, count] =
    range === 'day'  ? [3600e3,      24] :
    range === 'week' ? [6 * 3600e3,  28] :
                       [86400e3,     30];
  return Array.from({ length: count }, (_, i) => ({
    start: new Date(now - (count - i) * step),
    end:   new Date(now - (count - i - 1) * step)
  }));
}

function bucketLabel(bucket, range) {
  const d = bucket.start;
  if (range === 'day')
    return `${String(d.getHours()).padStart(2,'0')}:00`;
  if (range === 'week') {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    return `${days[d.getDay()]} ${String(d.getHours()).padStart(2,'0')}h`;
  }
  return d.toLocaleDateString('en-GB', { month: 'short', day: 'numeric' });
}

function assignToBuckets(records, buckets) {
  const result = buckets.map(() => []);
  for (const r of records) {
    const t = parseTs(r.ts).getTime();
    for (let i = 0; i < buckets.length; i++) {
      if (t >= buckets[i].start.getTime() && t < buckets[i].end.getTime()) {
        result[i].push(r.status);
        break;
      }
    }
  }
  return result;
}

let allRecords = [];
let activeRange = 'month';
const charts = {};

async function loadData() {
  const res = await fetch('history.ndjson');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  allRecords = text.trim().split('\n').filter(Boolean).map(l => JSON.parse(l));
}

function currentStatus(key) {
  const svcRecs = allRecords.filter(r => r.service === key);
  return svcRecs.length ? svcRecs[svcRecs.length - 1].status : 'unknown';
}

function badgeLabel(s) {
  return { up:'Operational', warn:'Degraded', maintenance:'Maintenance', down:'Down' }[s] ?? 'Unknown';
}

// ── Summary heatmap ──────────────────────────────────────────────────────────
function renderSummary(buckets, range) {
  const el = document.getElementById('summary');
  el.innerHTML = '';
  for (const svc of SERVICES) {
    const bkts = assignToBuckets(allRecords.filter(r => r.service === svc.key), buckets);
    const row = document.createElement('div');
    row.className = 'heatmap-row';

    const lbl = document.createElement('div');
    lbl.className = 'heatmap-label';
    lbl.textContent = svc.name;
    row.appendChild(lbl);

    const cells = document.createElement('div');
    cells.className = 'heatmap-cells';
    bkts.forEach((statuses, i) => {
      const s = statuses.length ? worst(statuses) : 'nodata';
      const cell = document.createElement('div');
      cell.className = `heatmap-cell cell-${s}`;
      cell.title = `${bucketLabel(buckets[i], range)}: ${s === 'nodata' ? 'no data' : s}`;
      cells.appendChild(cell);
    });
    row.appendChild(cells);
    el.appendChild(row);
  }
}

// ── Individual service chart ─────────────────────────────────────────────────
function renderChart(svc, buckets, range) {
  const bkts = assignToBuckets(allRecords.filter(r => r.service === svc.key), buckets);
  const labels   = buckets.map(b => bucketLabel(b, range));
  const bgColors = bkts.map(s => CLR[s.length ? worst(s) : 'nodata']);
  const tipText  = bkts.map(s => s.length ? worst(s) : 'no data');

  const canvas = document.getElementById(`c-${svc.key}`);
  if (charts[svc.key]) charts[svc.key].destroy();

  charts[svc.key] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: labels.map(() => 1),   // uniform height — color carries the meaning
        backgroundColor: bgColors,
        borderWidth: 0,
        borderRadius: 2,
        barPercentage: 0.92,
        categoryPercentage: 1.0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => labels[items[0].dataIndex],
            label: (item) => {
              const s = tipText[item.dataIndex];
              return '  ' + s.charAt(0).toUpperCase() + s.slice(1);
            }
          },
          displayColors: true,
          boxWidth: 9,
          boxHeight: 9
        }
      },
      scales: {
        x: {
          grid: { display: false },
          border: { display: false },
          ticks: {
            color: '#475569',
            font: { size: 9 },
            maxRotation: 0,
            autoSkip: true,
            maxTicksLimit: range === 'day' ? 12 : range === 'week' ? 8 : 10
          }
        },
        y: { display: false, min: 0, max: 1 }
      }
    }
  });
}

// ── Full render pass ─────────────────────────────────────────────────────────
function render(range) {
  const buckets = getBuckets(range);
  renderSummary(buckets, range);
  for (const svc of SERVICES) {
    renderChart(svc, buckets, range);
    const badge = document.getElementById(`badge-${svc.key}`);
    if (!badge) continue;
    const s = currentStatus(svc.key);
    badge.className = `badge badge-${s}`;
    badge.textContent = badgeLabel(s);
  }
}

// ── DOM scaffold ─────────────────────────────────────────────────────────────
function buildUI() {
  const last = allRecords.length ? parseTs(allRecords[allRecords.length - 1].ts) : null;
  const updated = last
    ? last.toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' })
    : '—';

  document.getElementById('app').innerHTML = `
    <header>
      <div class="logo">GatorStatus</div>
      <div class="filters">
        <button class="filter-btn" data-r="day">Day</button>
        <button class="filter-btn" data-r="week">Week</button>
        <button class="filter-btn" data-r="month">Month</button>
      </div>
      <div class="updated">Updated: ${updated}</div>
    </header>

    <div class="card">
      <div class="card-title">All Services</div>
      <div id="summary" class="heatmap"></div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-swatch" style="background:#22c55e"></div>Operational
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#eab308"></div>Degraded / Maintenance
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#ef4444"></div>Down
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:rgba(239,68,68,.18)"></div>No data
        </div>
      </div>
    </div>

    <div class="svc-grid">
      ${SERVICES.map(svc => `
        <div class="svc-card">
          <div class="svc-head">
            <span class="svc-name">${svc.name}</span>
            <span id="badge-${svc.key}" class="badge">—</span>
          </div>
          <div class="chart-wrap"><canvas id="c-${svc.key}"></canvas></div>
        </div>
      `).join('')}
    </div>
  `;

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeRange = btn.dataset.r;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(activeRange);
    });
  });

  document.querySelector(`.filter-btn[data-r="${activeRange}"]`).classList.add('active');
}

// ── Boot ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    await loadData();
    buildUI();
    render(activeRange);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="err">Failed to load data: ${e.message}</div>`;
  }
})();
</script>
</body>
</html>
