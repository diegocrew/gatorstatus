<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GatorStatus</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f172a;
      --surface: #1e293b;
      --border:  #334155;
      --text:    #f1f5f9;
      --muted:   #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .logo { font-size: 1.35rem; font-weight: 700; flex: 1; letter-spacing: -0.02em; }

    .filters { display: flex; gap: 0.375rem; }
    .filter-btn {
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 500;
    }
    .filter-btn:hover { color: var(--text); border-color: #475569; }
    .filter-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    .updated { color: var(--muted); font-size: 0.74rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .chart-wrap-lg { position: relative; height: 200px; }

    .svc-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
    }
    @media (max-width: 620px) { .svc-grid { grid-template-columns: 1fr; } }

    .svc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }
    .svc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .svc-name { font-size: 0.95rem; font-weight: 600; }

    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }
    .badge-up                       { background: rgba(34,197,94,.15);  color: #22c55e; }
    .badge-warn, .badge-maintenance { background: rgba(245,158,11,.15); color: #f59e0b; }
    .badge-down, .badge-unknown     { background: rgba(239,68,68,.15);  color: #ef4444; }

    .chart-wrap { position: relative; height: 140px; }

    .loading { text-align: center; padding: 4rem; color: var(--muted); }
    .err     { text-align: center; padding: 2rem; color: #ef4444; }
  </style>
</head>
<body>

<div id="app"><div class="loading">Loading…</div></div>

<script>
const SERVICES = [
  { key: 'ea',         name: 'EA',         color: '#60a5fa' },
  { key: 'steam',      name: 'Steam',      color: '#c084fc' },
  { key: 'ubisoft',    name: 'Ubisoft',    color: '#fb923c' },
  { key: 'epic_store', name: 'Epic Store', color: '#34d399' }
];

// Status → numeric y value
function sy(status) {
  if (status === 'up') return 2;
  if (status === 'warn' || status === 'maintenance') return 1;
  return 0;
}

// y value → segment/dot color
function yCol(y) {
  if (y === 2) return '#22c55e'; // green  – operational
  if (y === 1) return '#f59e0b'; // orange – partial / maintenance
  return '#ef4444';              // red    – down
}

function parseTs(ts) {
  const m = ts.match(/(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2}:\d{2}) (CET|CEST)/);
  if (!m) return new Date(ts);
  return new Date(`${m[1]}T${m[2]}${m[3] === 'CEST' ? '+02:00' : '+01:00'}`);
}

function winStart(range) {
  const now = Date.now();
  return range === 'day'  ? now - 864e5   // 24 h
       : range === 'week' ? now - 6048e5  // 7 d
                          : now - 2592e6; // 30 d
}

function fmtTick(ms, range) {
  const d = new Date(ms);
  if (range === 'day')
    return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  if (range === 'week') {
    const day = ['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()];
    return `${day} ${String(d.getHours()).padStart(2,'0')}h`;
  }
  return d.toLocaleDateString('en-GB', { month: 'short', day: 'numeric' });
}

// Shared y-axis config
const Y_SCALE = {
  min: -0.35,
  max: 2.35,
  border: { display: false },
  grid: { color: 'rgba(51,65,85,0.6)' },
  ticks: {
    color: '#475569',
    font: { size: 9 },
    stepSize: 1,
    callback: v => v === 0 ? 'Down' : v === 1 ? 'Partial' : v === 2 ? 'Up' : ''
  }
};

function xScale(range) {
  return {
    type: 'linear',
    min: winStart(range),
    max: Date.now(),
    border: { display: false },
    grid: { color: 'rgba(30,41,59,0.8)' },
    ticks: {
      color: '#475569',
      font: { size: 9 },
      maxTicksLimit: 8,
      autoSkip: true,
      callback: v => fmtTick(v, range)
    }
  };
}

let allRecords = [];
let activeRange = 'month';
const charts = {};

async function loadData() {
  const res = await fetch('history.ndjson');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  allRecords = (await res.text()).trim().split('\n').filter(Boolean).map(l => JSON.parse(l));
}

function currentStatus(key) {
  const r = allRecords.filter(x => x.service === key);
  return r.length ? r[r.length - 1].status : 'unknown';
}

function badgeLabel(s) {
  return { up:'Operational', warn:'Degraded', maintenance:'Maintenance', down:'Down' }[s] ?? 'Unknown';
}

// ── Summary: one line per service, fixed service color ──────────────────────
function renderSummaryChart(range) {
  const ws = winStart(range);
  const canvas = document.getElementById('summary-chart');
  if (charts.summary) charts.summary.destroy();

  const datasets = SERVICES.map(svc => {
    const data = allRecords
      .filter(r => r.service === svc.key && parseTs(r.ts).getTime() >= ws)
      .map(r => ({ x: parseTs(r.ts).getTime(), y: sy(r.status) }));
    return {
      label: svc.name,
      data,
      borderColor: svc.color,
      pointBackgroundColor: svc.color,
      pointBorderColor: svc.color,
      pointRadius: 3,
      pointHoverRadius: 5,
      borderWidth: 2,
      tension: 0,
      parsing: false
    };
  });

  charts.summary = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          labels: { color: '#94a3b8', boxWidth: 16, boxHeight: 2, padding: 14, font: { size: 11 } }
        },
        tooltip: {
          callbacks: {
            title: items => fmtTick(items[0].parsed.x, range),
            label: item => ` ${item.dataset.label}: ${['Down','Partial','Up'][item.parsed.y] ?? '?'}`
          }
        }
      },
      scales: { x: xScale(range), y: Y_SCALE }
    }
  });
}

// ── Individual service: dots + straight lines, segment color = destination ──
function renderServiceChart(svc, range) {
  const ws = winStart(range);
  const svcRecs = allRecords
    .filter(r => r.service === svc.key && parseTs(r.ts).getTime() >= ws);
  const data = svcRecs.map(r => ({ x: parseTs(r.ts).getTime(), y: sy(r.status) }));

  const canvas = document.getElementById(`c-${svc.key}`);
  if (charts[svc.key]) charts[svc.key].destroy();

  charts[svc.key] = new Chart(canvas, {
    type: 'line',
    data: {
      datasets: [{
        data,
        parsing: false,
        borderWidth: 2.5,
        borderColor: '#64748b',          // fallback; segment overrides per-segment
        pointBackgroundColor: data.map(d => yCol(d.y)),
        pointBorderColor:     data.map(d => yCol(d.y)),
        pointRadius: 4,
        pointHoverRadius: 7,
        tension: 0,
        // Color each segment by where it's *going*: destination y value
        segment: {
          borderColor: ctx => {
            const pt = data[ctx.p1DataIndex];
            return pt ? yCol(pt.y) : '#64748b';
          }
        }
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => fmtTick(items[0].parsed.x, range),
            label: item => ' ' + (['Down','Partial','Up'][item.parsed.y] ?? '?')
          }
        }
      },
      scales: { x: xScale(range), y: Y_SCALE }
    }
  });
}

// ── Full render pass ─────────────────────────────────────────────────────────
function render(range) {
  renderSummaryChart(range);
  for (const svc of SERVICES) {
    renderServiceChart(svc, range);
    const badge = document.getElementById(`badge-${svc.key}`);
    if (!badge) continue;
    const s = currentStatus(svc.key);
    badge.className = `badge badge-${s}`;
    badge.textContent = badgeLabel(s);
  }
}

// ── DOM scaffold ─────────────────────────────────────────────────────────────
function buildUI() {
  const last = allRecords.length ? parseTs(allRecords[allRecords.length - 1].ts) : null;
  const updated = last
    ? last.toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' })
    : '—';

  document.getElementById('app').innerHTML = `
    <header>
      <div class="logo">GatorStatus</div>
      <div class="filters">
        <button class="filter-btn" data-r="day">Day</button>
        <button class="filter-btn" data-r="week">Week</button>
        <button class="filter-btn" data-r="month">Month</button>
      </div>
      <div class="updated">Updated: ${updated}</div>
    </header>

    <div class="card">
      <div class="card-title">All Services</div>
      <div class="chart-wrap-lg"><canvas id="summary-chart"></canvas></div>
    </div>

    <div class="svc-grid">
      ${SERVICES.map(svc => `
        <div class="svc-card">
          <div class="svc-head">
            <span class="svc-name">${svc.name}</span>
            <span id="badge-${svc.key}" class="badge">—</span>
          </div>
          <div class="chart-wrap"><canvas id="c-${svc.key}"></canvas></div>
        </div>
      `).join('')}
    </div>
  `;

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeRange = btn.dataset.r;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(activeRange);
    });
  });

  document.querySelector(`.filter-btn[data-r="${activeRange}"]`).classList.add('active');
}

// ── Boot ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    await loadData();
    buildUI();
    render(activeRange);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="err">Failed to load data: ${e.message}</div>`;
  }
})();
</script>
</body>
</html>
