name: Service Status Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:          # manual trigger for testing

jobs:
  check-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit state.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Check StatusGator services (Ubisoft, Steam, EA)
        env:
          STATUSGATOR_TOKEN:   ${{ secrets.STATUSGATOR_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/statusgator.py

      - name: Check Epic Games Store (direct)
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/check_epic.py

      - name: Commit updated state.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update monitor state [skip ci]"
          git push